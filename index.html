<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mood Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background blobs -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="container">
  <h1>🎨 Mood Generator</h1>

  <h2 id="mood">Click to feel something ✨</h2>
  <p id="quote"></p>

  <div class="buttons">
    <button onclick="generateMood()">Generate Mood</button>
    <button onclick="copyColor()">Copy Color</button>
    <button id="music-btn" onclick="toggleMusic()">🎵 Music</button>
  </div>
</div>

<audio id="bg-music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0b3c.mp3?filename=lofi-study-112191.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
